<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实习经历 | 李翼菲</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(26,26,26,0.95);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 22px; font-weight: 800; color: #f5f0e6; letter-spacing: 2px; text-decoration: none; }
    .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: #c9a96e; }
    .nav-subtitle { font-size: 12px; color: #999; }
    .nav-back a {
      color: #ccc; text-decoration: none; font-size: 14px;
      transition: color 0.3s;
    }
    .nav-back a:hover { color: #c9a96e; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 140px 48px 80px;
    }

    .detail-header {
      display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .detail-num { color: #666; font-size: 18px; }
    .detail-title { font-size: 32px; font-weight: 700; color: #f5f0e6; }

    .detail-section { margin-bottom: 40px; }
    .detail-section h2 {
      font-size: 18px; color: #c9a96e; margin-bottom: 16px;
      font-weight: 600;
    }
    .detail-section p {
      font-size: 15px; line-height: 1.9; color: #aaa;
      margin-bottom: 14px;
    }
    .detail-section ul {
      list-style: disc inside;
      font-size: 15px; line-height: 1.9; color: #aaa;
    }
    .detail-section li { margin-bottom: 8px; }

    .placeholder {
      padding: 24px;
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    footer {
      text-align: center; padding: 40px;
      color: #444; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.04);
    }

    @media (max-width: 600px) {
      .navbar { padding: 14px 24px; }
      .container { padding: 110px 24px 60px; }
      .detail-title { font-size: 24px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="index.html" class="logo">李翼菲</a>
    <span class="logo-dot"></span>
    <span class="nav-subtitle">华南理工大学 · 学生</span>
  </div>
  <div class="nav-back">
    <a href="index.html">← 返回首页</a>
  </div>
</nav>

<main class="container">
  <div class="detail-header">
    <span class="detail-num">/01</span>
    <h1 class="detail-title">实习经历</h1>
  </div>

  <section class="detail-section">
    <h2>简介</h2>
    <p>这里填写实习经历的简要介绍。</p>
  </section>

  <section class="detail-section">
    <h2>详细内容</h2>
    <div class="placeholder">此处预留，请在这里补充详细信息。</div>
  </section>

  <section class="detail-section">
    <h2>高光时刻</h2>
    <ul>
      <li>待填写项目 1</li>
      <li>待填写项目 2</li>
      <li>待填写项目 3</li>
    </ul>
  </section>
</main>

<footer>
  &copy; 2026 李翼菲 · 用 GitHub Pages 搭建
</footer>

</body>
</html>
